stages:
  ingest:
    provider: gemini
    model: gemini-3-flash-preview
    # Japanese prose costs more tokens than English; raise the cap so the
    # model can finish a multi-snippet JSON array without truncation.
    max_tokens: 16384
  classify:
    provider: gemini
    model: gemini-3-flash-preview
    max_tokens: 2048
  consolidate:
    provider: gemini
    model: gemini-3-flash-preview
    # rename の reason フィールドが日本語で複数件返るため、ingest と同様に
    # 高めのキャップを与えて JSON が途中で切れないようにする。
    max_tokens: 16384
  compile:
    provider: gemini
    model: gemini-3-flash-preview
    max_tokens: 8192
